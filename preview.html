<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Превью шапки/футера</title>
<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>
</head>
<body>

<header class="jm-header" id="jm-header">
  <div class="jm-header-inner">
    <a class="jm-header-logo" href="/">Джет<span class="jm-accent">метрикс</span></a>

    <nav class="jm-nav">
      <a href="/" class="jm-nav-link">Главная</a>

      <div class="jm-nav-dropdown" id="jm-nav-hub">
        <button class="jm-nav-link jm-nav-dropdown-trigger" aria-expanded="false" aria-controls="jm-nav-hub-menu">
          Хаб знаний
          <svg class="jm-nav-caret" width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="jm-nav-dropdown-menu" id="jm-nav-hub-menu" hidden>
          <a href="#" class="jm-nav-dropdown-item jm-nav-dropdown-item--top">Хаб знаний</a>
          <a href="#" class="jm-nav-dropdown-item jm-nav-dropdown-item--sub">Читшиты</a>
          <a href="#" class="jm-nav-dropdown-item jm-nav-dropdown-item--sub">Атлас Метрик</a>
        </div>
      </div>

      <a href="#" class="jm-nav-link">Обучение</a>
      <a href="#" class="jm-nav-link">Консалтинг</a>
    </nav>

    <div class="jm-header-actions">
      <a href="#" class="jm-btn jm-btn--primary jm-btn--sm">Войти</a>
    </div>

    <button class="jm-header-burger" id="jm-header-burger" aria-expanded="false" aria-controls="jm-header-mobile" aria-label="Меню">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 6H21M3 12H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</header>

<div class="jm-header-mobile" id="jm-header-mobile" hidden>
  <a href="/" class="jm-header-mobile-link">Главная</a>
  <div class="jm-header-mobile-group">
    <div class="jm-header-mobile-group-title">Хаб знаний</div>
    <a href="#" class="jm-header-mobile-link jm-header-mobile-sublink">Читшиты</a>
    <a href="#" class="jm-header-mobile-link jm-header-mobile-sublink">Атлас Метрик</a>
  </div>
  <a href="#" class="jm-header-mobile-link">Обучение</a>
  <a href="#" class="jm-header-mobile-link">Консалтинг</a>
  <a href="#" class="jm-btn jm-btn--primary jm-header-mobile-cta">Войти</a>
</div>

<div style="min-height: 150vh; background: var(--jm-bg); padding: 48px; color: var(--jm-muted); font-family: var(--jm-font-sans);">(тестовая область для скролла — прокрути вниз, чтобы увидеть тень под шапкой)</div>

<footer class="jm-footer">
  <div class="jm-footer-inner">
    <a href="/" class="jm-footer-logo">Джет<span class="jm-accent">метрикс</span></a>
    <div class="jm-footer-links">
      <div class="jm-footer-col">
        <a href="#">Хаб знаний</a>
        <a href="#">Обучение</a>
        <a href="#">Консалтинг</a>
      </div>
      <div class="jm-footer-col">
        <a href="#">Контакты</a>
      </div>
    </div>
  </div>
  <hr>
  <div class="jm-footer-copyright">© 2026 Джетметрикс</div>
</footer>

</body>
</html>
