<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Превью шапки/футера</title>
<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>
</head>
<body>

<header class="jm-header" id="jm-header">
  <div class="jm-header-inner">
    <a class="jm-header-logo" href="/">Джет<span class="jm-accent">метрикс</span></a>

    <!-- Подсветку активного пункта локально видно так: /cheatsheets.html,
         /learning.html и т.п. рядом с preview.html — header.js читает слаг
         из адреса. На самом preview.html не подсвечивается ничего. -->
    <nav class="jm-nav">
      <a href="/" class="jm-nav-link" data-nav="home">Главная</a>
      <a href="#" class="jm-nav-link" data-nav="knowledge">Хаб знаний</a>
      <a href="#" class="jm-nav-link" data-nav="learning">Обучение</a>
      <a href="#" class="jm-nav-link" data-nav="consulting">Консалтинг</a>
    </nav>

    <div class="jm-header-actions">
      <a href="#" class="jm-btn jm-btn--primary jm-btn--sm">Войти</a>
    </div>

    <button class="jm-header-burger" id="jm-header-burger" aria-expanded="false" aria-controls="jm-header-mobile" aria-label="Меню">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 6H21M3 12H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</header>

<div class="jm-header-mobile" id="jm-header-mobile" hidden>
  <a href="/" class="jm-header-mobile-link" data-nav="home">Главная</a>
  <a href="#" class="jm-header-mobile-link" data-nav="knowledge">Хаб знаний</a>
  <a href="#" class="jm-header-mobile-link" data-nav="learning">Обучение</a>
  <a href="#" class="jm-header-mobile-link" data-nav="consulting">Консалтинг</a>
  <a href="#" class="jm-btn jm-btn--primary jm-header-mobile-cta">Войти</a>
</div>

<div style="min-height: 150vh; background: var(--jm-bg); padding: 48px; color: var(--jm-muted); font-family: var(--jm-font-sans);">(тестовая область для скролла — прокрути вниз, чтобы увидеть тень под шапкой)</div>

<footer class="jm-footer">
  <div class="jm-footer-inner">
    <a href="/" class="jm-footer-logo">Джет<span class="jm-accent">метрикс</span></a>
    <div class="jm-footer-links">
      <div class="jm-footer-col">
        <a href="#">Хаб знаний</a>
        <a href="#">Обучение</a>
        <a href="#">Консалтинг</a>
      </div>
      <div class="jm-footer-col">
        <a href="#">Контакты</a>
      </div>
    </div>
  </div>
  <hr>
  <div class="jm-footer-copyright">© 2026 Джетметрикс</div>
</footer>

</body>
</html>
